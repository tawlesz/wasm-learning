<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par ou impar com streaming</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="box">
            <form action="">
                <div><input type="number" id="num"></div>
                <input type="button" onclick="runWasm()">
                <p id="ret"></p>
            </form>
        </div>
    </div>
    <script>
        var FunIns;
        WebAssembly.instantiateStreaming(
            fetch("functions.wasm"), {}
        ).then(results => FunIns = results.instance.exports)

        function runWasm() {
            var a = document.querySelector("#num").value;
            var res = FunIns.functions(a);
            if (res == 0) {
                document.querySelector("#ret").innerHTML += `O valor ${a} é par </br>` ;
            } else if (res == 1) { 
                document.querySelector("#ret").innerHTML += `O valor ${a} é par </br>` ;
            }
        }
    </script>
</body>

</html>
