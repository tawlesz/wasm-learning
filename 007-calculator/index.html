<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="head">
                <h1>CALCULATOR.io</h1>
            </div>
            <div class="card">
                <div class="box-input">
                    <label for="v1"></label>
                    <input type="number" id="v1" placeholder="Digite aqui" class="input">
                    <label for="v2"></label>
                    <input type="number" id="v2" placeholder="Digite aqui" class="input">
                    <p class="res"></p>
                </div>
                <div class="operations">
                    <div class="line">
                        <label for="add"></label>
                        <input type="submit" id="add" value="+" class="btn" onclick="runSoma()">
                        <label for="sub"></label>
                        <input type="submit" id="sub" value="-" class="btn" onclick="runSub()">
                    </div>
                    <div class="line">
                        <label for="mult"></label>
                        <input type="submit" id="mult" value="*" class="btn" onclick="runMulti()">
                        <label for="div"></label>
                        <input type="submit" id="div" value="/" class="btn" onclick="runDiv()">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="build/main.js"></script>
    <script>

        var somarDois = Module.cwrap(
            "somarDois", "number", ["number","number"]
        );
        var subtrairDois = Module.cwrap(
            "subtrairDois", "number", ["number","number"]
        );
        var multiplicarDois = Module.cwrap(
            "multiplicarDois", "number", ["number","number"]
        );
        var dividirDois = Module.cwrap(
            "dividirDois", "number", ["number","number"]
        );

        function runSoma(){
            var a = document.querySelector("#v1").value;
            var b = document.querySelector("#v2").value;
            var res = somarDois(a, b);
            console.log(res);
        }
        function runSub(){
            var a = document.querySelector("#v1").value;
            var b = document.querySelector("#v2").value;
            var res = subtrairDois(a, b);
            console.log(res);
        }
        function runMulti(){
            var a = document.querySelector("#v1").value;
            var b = document.querySelector("#v2").value;
            var res = multiplicarDois(a, b);
            console.log(res);
        }   
        function runDiv(){
            var a = document.querySelector("#v1").value;
            var b = document.querySelector("#v2").value;
            var res = dividirDois(a, b);
            console.log(res);
        }
    </script>
</body>
</html>
